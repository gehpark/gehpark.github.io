<html> 
  <head> 
  	<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            height: calc(100vh - 40px);
        }

        .column {
        	flex:1;
        }

        .clock-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            padding-top: 250px;
            padding-bottom: 150px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .digital-clock {
            font-size: 160px;
            font-weight: bold;
            font-family: 'Times New Roman', monospace;
            letter-spacing: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .date-display {
            font-size: 58px;
            color: #666;
            font-family: 'Times New Roman', monospace;
            margin-top: 20px;
            font-weight: 300;
        }

        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
                height: auto;
            }

            .digital-clock {
                font-size: 140px;
            }

            .date-display {
                font-size: 24px;
            }
        }

        @media (max-width: 640px) {
            .digital-clock {
                font-size: 60px;
                letter-spacing: 5px;
            }

            .date-display {
                font-size: 18px;
            }
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script> 
    $(function(){
      $("#mta-section").load("subway.html"); 
    });
    </script> 
  </head> 

  <body> 
  	<div class="dashboard">
     	<div class="column">
     	<div class="clock-section">
	        <div class="digital-clock" id="digitalClock">00:00</div>
	        <div class="date-display" id="dateDisplay">Loading...</div>
	    </div></div>
     	<div class="column" id="mta-section"></div>
	 </div>
  </body> 

  <script>

    function updateClock() {
        const now = new Date();
        
        // Update digital clock (HH:MM)
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('digitalClock').textContent = `${hours}:${minutes}`;
        
        // Update date
        const options = { weekday: 'short', month: 'short', day: 'numeric' };
        const dateString = now.toLocaleDateString('en-US', options);
        document.getElementById('dateDisplay').textContent = dateString;

        // 1. Calculate the delay for the NEXT execution
        const delay = getNextDelay();

        // 2. Schedule the next run
        setTimeout(updateClock, delay);
    }

    function getNextDelay() {
        const now = new Date();
        const day = now.getDay(); // 0 (Sun) to 6 (Sat)
        const hour = now.getHours();
        const isWeekend = (day === 0 || day === 6);

        // Weekend Logic: 1 minute all day
        if (isWeekend) {
            return 60 * 1000;
        }

        // Weekday Logic (Monday - Friday)
        if (hour >= 8 && hour < 10) {
            return 20 * 1000; // 20 seconds
        } 
        else if (hour >= 10 && hour < 11) {
            return 40 * 1000; // 40 seconds
        } 
        else if (hour >= 11 || hour < 1) {
            return 60 * 1000; // 1 minute (11am to 1am)
        } 
        else {
            return 10 * 60 * 1000; // 10 minutes (1am to 8am)
        }
    }

    // Start the cycle
    updateClock();
  </script>
</html>
