<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTA AC Train - 523 Franklin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .station-name {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .line-badge {
            display: inline-block;
            background: #0039A6;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            font-size: 24px;
            font-weight: bold;
            margin-right: 10px;
        }

        .last-updated {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        .arrivals-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-top: 10px;
            margin-bottom: 0px;
            padding-bottom: 0px;
            border-bottom: 2px solid #f0f0f0;
        }

        .arrival-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            transition: transform 0.2s;
        }

        .arrival-item:hover {
            transform: translateX(5px);
        }

        .direction {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .time {
            font-size: 28px;
            font-weight: bold;
            color: #0039A6;
        }

        .minutes {
            font-size: 14px;
            color: #666;
        }

        .no-trains {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 18px;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .refresh-btn {
            background: #0039A6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #002a7a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="last-updated" id="lastUpdated">Loading...</div>
        </div>

        <div class="arrivals-container">

            <div id="errorContainer"></div>
            
            <div class="section-title">Franklin Av</div>
            <div id="franklinTrains" class="loading">Loading train data...</div>

            <div class="section-title" style="margin-top: 0px;">Nostrand Av</div>
            <div id="nostrandTrains" class="loading">Loading train data...</div>

            <button class="refresh-btn" onclick="loadTrainData()">Refresh Data</button>
        </div>
    </div>

    <script>
        function displayTrains(trains, containerId) {
            const container = document.getElementById(containerId);
            
            if (!trains || trains.length === 0) {
                container.innerHTML = '<div class="no-trains">No trains scheduled</div>';
                return;
            }

            container.innerHTML = trains.map(train => `
                <div class="arrival-item">
                    <div class="direction">${train.routeId}</div>
                    <div>
                        <div class="time">${train.minutes} min</div>
                        <div class="minutes">${train.minutes === 1 ? 'minute' : 'minutes'}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateLastUpdated() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour: 'numeric', 
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdated').textContent = `Last updated: ${timeString}`;
        }

        async function loadTrainData() {
            console.log("Loading train data...");
            try {
                // local test line
                // const response = await fetch('http://localhost:3000/api/trains');
                const response = await fetch('https://gehpark-github-io.onrender.com/api/trains')
                const result = await response.json();
                
                if (result.success) {
                    displayTrains(result.data.franklin, 'franklinTrains');
                    displayTrains(result.data.nostrand, 'nostrandTrains');
                    console.log("Data loaded successfully");
                } else {
                    document.getElementById('errorContainer').innerHTML = 
                        `<div class="error">Error: ${result.error}</div>`;
                }
            } catch (error) {
                console.error('Error loading train data:', error);
                document.getElementById('errorContainer').innerHTML = 
                    `<div class="error">Cannot connect to server. Make sure Node.js server is running on port 3000.</div>`;
            }

            updateLastUpdated();
        }

        // Initial load
        loadTrainData();

        setInterval(loadTrainData, 30000 /*30 seconds*/ );

    </script>
</body>
</html>
